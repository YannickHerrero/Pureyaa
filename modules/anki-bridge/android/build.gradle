plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.ankibridge'
version = '1.0.0'

repositories {
  maven { url 'https://jitpack.io' }
}

android {
  namespace "expo.modules.ankibridge"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
}

dependencies {
  implementation 'com.github.ankidroid:Anki-Android:api-v1.1.0'
}
